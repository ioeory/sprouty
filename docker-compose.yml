version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sprouts-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-sprouts}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sprouts123}
      POSTGRES_DB: ${DB_NAME:-sprouts_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sprouts-backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-sprouts}
      DB_PASSWORD: ${DB_PASSWORD:-sprouts123}
      DB_NAME: ${DB_NAME:-sprouts_db}
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      BOT_PROXY: ${BOT_PROXY:-}
      # OIDC callback redirects here with ?exchange= after login (must match how users open the UI)
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:4000}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sprouts-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "4000:80"

volumes:
  postgres_data:
